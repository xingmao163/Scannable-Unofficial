name: Build All

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: Specific version to build (e.g. 1.21.1). Leave empty to build all stable versions.
        required: false
        default: ""
      include_beta:
        description: Include beta-only NeoForge targets
        required: false
        default: "false"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.versions.outputs.stable }}
      beta: ${{ steps.versions.outputs.beta }}
    steps:
      - id: versions
        run: |
          TARGET="${{ github.event.inputs.target_version || '' }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$TARGET" ]; then
            echo "stable=[\"$TARGET\"]" >> "$GITHUB_OUTPUT"
            echo "beta=[]" >> "$GITHUB_OUTPUT"
          else
            echo 'stable=["1.21.1","1.21.3","1.21.4"]' >> "$GITHUB_OUTPUT"
            echo 'beta=["1.21.2"]' >> "$GITHUB_OUTPUT"
          fi

  stable-build:
    needs: [resolve-versions]
    name: Stable ${{ matrix.mc }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        mc: ${{ fromJSON(needs.resolve-versions.outputs.stable) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-cleanup: always

      - uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.mc }}
        run: ./gradlew clean :neoforge:build --no-daemon --stacktrace -x test -PtargetVersion=${{ matrix.mc }}

      - uses: actions/upload-artifact@v4
        with:
          name: Scannable-Unofficial-${{ matrix.mc }}-${{ github.sha }}
          path: neoforge/build/libs/*.jar
          retention-days: 14
          compression-level: 9
          if-no-files-found: error

  beta-build:
    needs: [resolve-versions]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_beta == 'true' && fromJSON(needs.resolve-versions.outputs.beta).length > 0 }}
    name: Beta ${{ matrix.mc }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        mc: ${{ fromJSON(needs.resolve-versions.outputs.beta) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-cleanup: always

      - uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.mc }}
        run: ./gradlew clean :neoforge:build --no-daemon --stacktrace -x test -PtargetVersion=${{ matrix.mc }}

      - uses: actions/upload-artifact@v4
        with:
          name: Scannable-Unofficial-${{ matrix.mc }}-${{ github.sha }}
          path: neoforge/build/libs/*.jar
          retention-days: 7
          compression-level: 9
          if-no-files-found: error
