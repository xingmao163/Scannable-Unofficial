name: Build Matrix

on:
  workflow_dispatch:
    inputs:
      include_beta:
        description: Include beta-only NeoForge targets
        required: false
        default: "false"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stable-build:
    name: Stable ${{ matrix.mc }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        mc:
          - 1.21.1
          - 1.21.3
          - 1.21.4
          - 1.21.5
          - 1.21.8
          - 1.21.10
          - 1.21.11

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-cleanup: always

      - uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.mc }}
        run: ./gradlew clean :neoforge:build --no-daemon --stacktrace -x test -PtargetVersion=${{ matrix.mc }}

      - uses: actions/upload-artifact@v4
        with:
          name: Scannable-Unofficial-${{ matrix.mc }}-${{ github.sha }}
          path: neoforge/build/libs/*.jar
          retention-days: 14
          compression-level: 9
          if-no-files-found: error

  beta-build:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_beta == 'true' }}
    name: Beta ${{ matrix.mc }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        mc:
          - 1.21.2
          - 1.21.6
          - 1.21.7
          - 1.21.9

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-cleanup: always

      - uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.mc }}
        run: ./gradlew clean :neoforge:build --no-daemon --stacktrace -x test -PtargetVersion=${{ matrix.mc }}

      - uses: actions/upload-artifact@v4
        with:
          name: Scannable-Unofficial-${{ matrix.mc }}-${{ github.sha }}
          path: neoforge/build/libs/*.jar
          retention-days: 7
          compression-level: 9
          if-no-files-found: error
