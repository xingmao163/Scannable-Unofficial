name: Build Mod

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_version:
        description: '目标版本（留空则构建全部）'
        required: false
        type: choice
        options:
          - ''
          - 1.21.1
          - 1.21.2
          - 1.21.3
          - 1.21.4
          - 26.1.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        target: [1.21.1, 1.21.2, 1.21.3, 1.21.4, 26.1.2]
        include:
          - target: 1.21.1
            java: 21
          - target: 1.21.2
            java: 21
          - target: 1.21.3
            java: 21
          - target: 1.21.4
            java: 21
          - target: 26.1.2
            java: 25
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.java == 25 && 'oracle' || 'temurin' }}
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-cleanup: on-success

      - uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Mod (${{ matrix.target }})
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target_version == '' || matrix.target == inputs.target_version)) || (github.event_name != 'workflow_dispatch' && matrix.target == '1.21.1') }}
        run: ./gradlew build --stacktrace -x test -PtargetVersion=${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target_version == '' || matrix.target == inputs.target_version)) || (github.event_name != 'workflow_dispatch' && matrix.target == '1.21.1') }}
        with:
          name: Scannable-Unofficial-${{ matrix.target }}-${{ github.sha }}
          path: build/libs/*.jar
          retention-days: 14
          compression-level: 9
          if-no-files-found: warn
