name: Build Mod

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-cleanup: always

      - uses: gradle/actions/wrapper-validation@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Mod
        run: ./gradlew clean :neoforge:build --no-daemon --stacktrace -x test

      - uses: actions/upload-artifact@v4
        with:
          name: Scannable-Unofficial-build-${{ github.sha }}
          path: neoforge/build/libs/*.jar
          retention-days: 14
          compression-level: 9
          if-no-files-found: error
